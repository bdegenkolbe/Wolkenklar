name: Sync Wiki from Wolkenfrei.md

on:
  push:
    branches: [main]
    paths:
      - 'Wolkenfrei.md'
      - 'build_github_wiki.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate wiki pages
        run: python build_github_wiki.py

      - name: Push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Wiki aktualisiert aus Wolkenfrei.md ($(date +%Y-%m-%d))"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git
          git push origin master --force
